<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria — Gerador de mapas</title>
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#10151c; --muted:#5b6573; --line:#dfe4ea; --brand:#f2671f; --red:#c81712; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:'Open Sans',system-ui,sans-serif; color:var(--ink); background:#f4f6f9; }
    header { display:flex; align-items:center; justify-content:space-between;
      padding:16px 28px; background:#fff; border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
    header h1 { font-size:1.1rem; margin:0; }
    header .actions { display:flex; gap:10px; align-items:center; }
    .who { font-size:.82rem; color:var(--muted); margin-right:6px; }
    button, a.btn { font:inherit; cursor:pointer; border-radius:9px; padding:9px 14px; border:1px solid var(--line);
      background:#fff; color:var(--ink); text-decoration:none; font-size:.88rem; }
    .btn-primary { background:var(--brand); color:#fff; border:0; font-weight:700; }
    main { max-width:1100px; margin:28px auto; padding:0 20px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:12px; overflow:hidden; display:flex; flex-direction:column; }
    .thumb { width:100%; aspect-ratio:4/5; object-fit:cover; background:#eef1f5; display:block; }
    .thumb.empty { display:grid; place-items:center; color:var(--muted); font-size:.8rem; }
    .card__body { padding:12px 14px; display:flex; flex-direction:column; gap:6px; flex:1; }
    .card__title { font-weight:700; font-size:.95rem; line-height:1.25; }
    .card__meta { font-size:.76rem; color:var(--muted); }
    .card__actions { display:flex; gap:6px; padding:0 14px 14px; flex-wrap:wrap; }
    .card__actions button, .card__actions a { padding:7px 10px; font-size:.8rem; }
    .link-danger { color:var(--red); border-color:#f3c9c7; }
    .empty-state { text-align:center; color:var(--muted); padding:80px 20px; }
    .empty-state h2 { color:var(--ink); font-weight:700; }
    .msg { text-align:center; color:var(--red); font-size:.9rem; min-height:1.2em; }
  </style>
</head>
<body>
  <header>
    <h1>Galeria de peças</h1>
    <div class="actions">
      <span class="who" id="who"></span>
      <a class="btn" href="/admin.html" id="admin-link" style="display:none">Admin</a>
      <a class="btn btn-primary" href="/">+ Nova peça</a>
      <button id="logout">Sair</button>
    </div>
  </header>
  <main>
    <div class="msg" id="msg"></div>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty" style="display:none">
      <h2>Nenhuma peça ainda</h2>
      <p>Crie a primeira em "Nova peça".</p>
    </div>
  </main>
  <script type="module" src="./galeria.js"></script>
</body>
</html>
